<?xml version="1.0" encoding="UTF-8"?>
<!--
  Timed Focus extension icon — master SVG source.
  Filled red circle + white bar. Matches the runtime canvas renderer
  in background/icon-renderer.js and the Paper design system.
  Bar ratio: 65% × 16% of circle diameter.
  Regenerate PNGs with:
    magick icons/icon.svg -resize NxN -background none icons/icon-N.png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="61.44" fill="#D94A3D"/>
  <rect x="34.08" y="54.16" width="59.84" height="19.68" rx="9.84" fill="#FFFFFF"/>
</svg>
