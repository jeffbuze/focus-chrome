<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timed Focus — Icon Renderer Preview (v2)</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #F5F1E8;
    color: #1A1A1A;
    margin: 0;
    padding: 48px;
  }
  h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.02em; margin: 0 0 6px; }
  p.sub { color: #6B6B6B; margin: 0 0 32px; font-size: 13px; }

  .grid {
    display: grid;
    grid-template-columns: 160px repeat(5, 1fr);
    gap: 1px;
    background: #E8E1D0;
    border: 1px solid #E8E1D0;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 48px;
    max-width: 1200px;
  }
  .cell {
    background: #FFFFFF;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    justify-content: center;
    min-height: 100px;
  }
  .cell.label {
    background: #F9F5EC;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #6B6B6B;
    align-items: flex-start;
    justify-content: center;
    padding-left: 24px;
  }
  .cell.size-header { font-weight: 700; color: #1A1A1A; }

  .toolbar-row {
    display: flex;
    gap: 16px;
    margin-top: 40px;
    flex-wrap: wrap;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #ECEEF0;
    border-radius: 6px;
  }
  .toolbar .url {
    font-size: 11px;
    color: #6B7280;
    background: #fff;
    padding: 3px 10px;
    border-radius: 4px;
    min-width: 140px;
  }
  .toolbar .state-label {
    font-size: 11px;
    font-weight: 600;
    color: #374151;
  }

  canvas { display: block; image-rendering: auto; }
  canvas.s16 { width: 16px;  height: 16px;  }
  canvas.s19 { width: 19px;  height: 19px;  }
  canvas.s32 { width: 32px;  height: 32px;  }
  canvas.s48 { width: 48px;  height: 48px;  }
  canvas.s128 { width: 128px; height: 128px; }
  .pixel-size { font-size: 10px; color: #9CA3AF; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<h1>Icon renderer · preview (v2)</h1>
<p class="sub">Same drawing logic as <code>background/icon-renderer.js</code>. Color is the signal — no badge overlay.</p>

<div class="grid" id="grid"></div>

<h1 style="font-size: 18px; margin-bottom: 16px;">In context · browser toolbar</h1>
<div class="toolbar-row" id="toolbarRow"></div>

<script>
  // ── Drawing logic (kept in sync with background/icon-renderer.js) ──────────────
  const COLORS = {
    default: '#D94A3D',
    timer:   '#2D9A4E',
    urgent:  '#E5A100',
    blocked: '#D94A3D',
    paused:  '#B8B2A5',
  };

  function roundedRectPath(ctx, x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.lineTo(x + w - rr, y);
    ctx.arcTo(x + w, y, x + w, y + rr, rr);
    ctx.lineTo(x + w, y + h - rr);
    ctx.arcTo(x + w, y + h, x + w - rr, y + h, rr);
    ctx.lineTo(x + rr, y + h);
    ctx.arcTo(x, y + h, x, y + h - rr, rr);
    ctx.lineTo(x, y + rr);
    ctx.arcTo(x, y, x + rr, y, rr);
    ctx.closePath();
  }

  function drawCircle(ctx, size, color) {
    const r = size * 0.48;
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawBar(ctx, size) {
    const cx = size / 2, cy = size / 2;
    const diameter = size * 0.48 * 2;
    const barW = diameter * 0.65;
    const barH = diameter * 0.16;
    roundedRectPath(ctx, cx - barW / 2, cy - barH / 2, barW, barH, barH / 2);
    ctx.fillStyle = '#FFFFFF';
    ctx.fill();
  }

  function drawNumber(ctx, size, text) {
    const str = String(text);
    const baseFactor = str.length >= 3 ? 0.42 : str.length === 2 ? 0.56 : 0.66;
    const fontSize = Math.round(size * baseFactor);
    ctx.font = `900 ${fontSize}px -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(str, size / 2, size / 2 + size * 0.02);
  }

  function drawX(ctx, size) {
    const cx = size / 2, cy = size / 2;
    const half = size * 0.18;
    const thickness = Math.max(1.5, size * 0.11);
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = thickness;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - half, cy - half);
    ctx.lineTo(cx + half, cy + half);
    ctx.moveTo(cx + half, cy - half);
    ctx.lineTo(cx - half, cy + half);
    ctx.stroke();
  }

  function drawPauseBars(ctx, size) {
    const cx = size / 2, cy = size / 2;
    const barW = size * 0.11;
    const barH = size * 0.36;
    const gap = size * 0.08;
    const totalW = barW * 2 + gap;
    const startX = cx - totalW / 2;
    const startY = cy - barH / 2;
    const r = barW / 3;
    ctx.fillStyle = '#FFFFFF';
    roundedRectPath(ctx, startX, startY, barW, barH, r);
    ctx.fill();
    roundedRectPath(ctx, startX + barW + gap, startY, barW, barH, r);
    ctx.fill();
  }

  function drawIcon(ctx, size, state, text) {
    ctx.clearRect(0, 0, size, size);
    drawCircle(ctx, size, COLORS[state] || COLORS.default);
    switch (state) {
      case 'timer':
      case 'urgent':
        if (text) drawNumber(ctx, size, text); else drawBar(ctx, size);
        break;
      case 'blocked': drawX(ctx, size); break;
      case 'paused':  drawPauseBars(ctx, size); break;
      default:        drawBar(ctx, size);
    }
  }

  function renderAt(canvas, size, state, text) {
    // Supersample at 4× then downscale — matches icon-renderer.js
    const SUPERSAMPLE = 4;
    const srcSize = size * SUPERSAMPLE;
    const src = document.createElement('canvas');
    src.width = srcSize;
    src.height = srcSize;
    drawIcon(src.getContext('2d'), srcSize, state, text);

    canvas.width = size;
    canvas.height = size;
    const dst = canvas.getContext('2d');
    dst.imageSmoothingEnabled = true;
    dst.imageSmoothingQuality = 'high';
    dst.drawImage(src, 0, 0, size, size);
  }

  // ── States to preview ──────────────────────────────────────────────────────────
  const STATES = [
    { name: 'Default',    state: 'default', text: '',   label: 'Idle' },
    { name: 'Time Left',  state: 'timer',   text: '20', label: '20 min left' },
    { name: 'Urgent',     state: 'urgent',  text: '45', label: '45 sec' },
    { name: 'Blocked',    state: 'blocked', text: '',   label: 'Focus page' },
    { name: 'On Pause',   state: 'paused',  text: '',   label: 'Blocking off' },
  ];

  const SIZES = [16, 19, 32, 48, 128];

  // ── Render grid ────────────────────────────────────────────────────────────────
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `160px repeat(${STATES.length}, 1fr)`;

  grid.insertAdjacentHTML('beforeend', `<div class="cell label"></div>`);
  for (const s of STATES) {
    grid.insertAdjacentHTML('beforeend', `<div class="cell size-header">${s.name}</div>`);
  }

  for (const size of SIZES) {
    grid.insertAdjacentHTML('beforeend', `<div class="cell label">${size}×${size} px<br><span class="pixel-size" style="font-weight:500; text-transform:none; letter-spacing:0;">toolbar size</span></div>`);
    for (const s of STATES) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const canvas = document.createElement('canvas');
      canvas.className = 's' + size;
      cell.appendChild(canvas);
      grid.appendChild(cell);
      renderAt(canvas, size, s.state, s.text);
    }
  }

  // ── Toolbar context row ────────────────────────────────────────────────────────
  const row = document.getElementById('toolbarRow');
  for (const s of STATES) {
    const el = document.createElement('div');
    el.className = 'toolbar';
    el.innerHTML = `
      <div class="url">${s.state === 'blocked' || s.state === 'paused' ? 'reddit.com' : 'example.com'}</div>
      <canvas class="s19"></canvas>
      <span class="state-label">${s.name} · ${s.label}</span>
    `;
    row.appendChild(el);
    renderAt(el.querySelector('canvas'), 19, s.state, s.text);
  }
</script>

</body>
</html>
