<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440">
<title>Timed Focus – Small Promo Tile (440×280)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 440px;
    height: 280px;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
  }

  .tile {
    width: 440px;
    height: 280px;
    background: #0d1117;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle radial glow */
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 320px 200px at 50% 30%, rgba(91,141,239,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 180px 120px at 75% 70%, rgba(234,67,53,0.10) 0%, transparent 60%);
  }

  /* Grid pattern */
  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
    padding: 0 40px;
  }

  /* Logo mark */
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .logo-svg {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    filter: drop-shadow(0 4px 12px rgba(234,67,53,0.35));
  }

  .app-name {
    font-size: 28px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .tagline {
    font-size: 13.5px;
    font-weight: 500;
    color: #8b9cb8;
    letter-spacing: 0.01em;
    line-height: 1.5;
  }

  .pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 4px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    font-size: 11px;
    font-weight: 500;
    color: #a0b0c8;
    letter-spacing: 0.02em;
  }

  .pill-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .dot-blue  { background: #5b8def; }
  .dot-green { background: #2d9a4e; }
  .dot-amber { background: #e5a100; }
</style>
</head>
<body>
<div class="tile">
  <div class="content">

    <div class="logo-wrap">
      <!-- Timed Focus logo: red circle with white block bar -->
      <svg class="logo-svg" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="22" fill="#EA4335"/>
        <rect x="7" y="18" width="30" height="8" rx="2" fill="white"/>
      </svg>
      <span class="app-name">Timed Focus</span>
    </div>

    <p class="tagline">Block distracting sites. Set time budgets.<br>Unblock with intention.</p>

    <div class="pills">
      <span class="pill"><span class="pill-dot dot-blue"></span>Site Groups</span>
      <span class="pill"><span class="pill-dot dot-green"></span>Schedules</span>
      <span class="pill"><span class="pill-dot dot-amber"></span>Mindful Pausing</span>
    </div>

  </div>
</div>
</body>
</html>
